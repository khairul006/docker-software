listeners.ssl.default = 5671

# ssl_options.cacertfile = /etc/rabbitmq/ssl/cert.pem
# ssl_options.certfile = /etc/rabbitmq/ssl/cert.pem
# ssl_options.keyfile = /etc/rabbitmq/ssl/key.pem
# ssl_options.verify = verify_peer
# ssl_options.fail_if_no_peer_cert = true

loopback_users.guest = false

log.console = true
#log.console.level = debug
log.console.level = info

#log.file.level = debug
log.file.level = info
log.dir = /var/log/rabbitmq

# rotate every night at midnight
log.file.rotation.date = $D0

# keep up to X archived log files in addition to the current one
log.file.rotation.count = 180

management.http_log_dir = /var/log/rabbitmq/http

#listeners.ssl.default = 5671
#ssl_options.cacertfile = /certs/ca_certificate.pem
#ssl_options.certfile   = /certs/server_certificate.pem
#ssl_options.keyfile    = /certs/server_key.pem
#ssl_options.password   = teras

#management.ssl.port       = 15671
#management.ssl.cacertfile = /certs/ca_certificate.pem
#management.ssl.certfile   = /certs/server_certificate.pem
#management.ssl.keyfile    = /certs/server_key.pem
#management.ssl.password   = teras

mqtt.listeners.tcp.default = 1883
## Default MQTT with TLS port is 8883
# mqtt.listeners.ssl.default = 8883

# anonymous connections, if allowed, will use the default
# credentials specified here
mqtt.allow_anonymous  = false
# mqtt.default_user     = mqtt-user
# mqtt.default_pass     = mqtt-password

mqtt.vhost            = /
mqtt.exchange         = amq.topic

vm_memory_high_watermark.relative = 0.6
# 12 hours TTL
# mqtt.subscription_ttl = 43200000
# 12 hours TTL (updated to the new configuration option)
# mqtt.max_session_expiry_interval_seconds = 43200  # 12 hours in seconds


## Target (desired) interval (in milliseconds) at which we run background GC.
## The actual interval will vary depending on how long it takes to execute
## the operation (can be higher than this interval). Values less than

## 30000 milliseconds are not recommended.
##
background_gc_enabled = true
background_gc_target_interval = 900000